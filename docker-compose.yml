version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: scanner_db
    environment:
      POSTGRES_DB: scanner_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped

  laravel:
    build: 
      context: ./scanner-app
    container_name: scanner_laravel
    ports:
      - "8085:8080"
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=scanner_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - FASTAPI_URL=http://fastapi:8081
    volumes:
      - ./scanner-app:/app
    depends_on:
      - db
    restart: unless-stopped
    command: php artisan serve --host=0.0.0.0 --port=8080

  queue_worker:
    build: 
      context: ./scanner-app
    container_name: scanner_queue_worker
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=scanner_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - FASTAPI_URL=http://fastapi:8081
    volumes:
      - ./scanner-app:/app
    depends_on:
      - db
      - fastapi
    restart: unless-stopped
    command: php artisan queue:work --tries=3 --timeout=120

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scanner_fastapi
    ports:
      - "8081:8081"
    volumes:
      - .:/app
    restart: unless-stopped
    command: bash -c "cd /app/src && uvicorn fastapi_app:app --host 0.0.0.0 --port 8081"

volumes:
  db_data:
